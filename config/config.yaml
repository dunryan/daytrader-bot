# ════════════════════════════════════════════════════════════
#  daytrader-bot runtime configuration (non-secret).
#  Secrets live in .env. This file is validated at startup by
#  daytrader.config.settings — a bad value fails loudly on boot.
# ════════════════════════════════════════════════════════════

app:
  simulation_mode: true             # MASTER TOGGLE. true = VirtualBroker, no real capital.
                                    # Keep true until the pipeline passes the paper gate.
  timezone: "America/New_York"
  log_level: "INFO"                # DEBUG | INFO | WARNING | ERROR
  db_path: "data/trading.db"

# ── Data & Research (Modules 1 & 2) ──
data:
  provider: "alpaca"               # alpaca (default). Abstraction allows others later.
  feed: "iex"                      # iex (free) | sip (paid). Alpaca market-data feed.
  timeframes: ["1m", "5m", "15m", "1d"]
  poll_interval_seconds: 60
  rth_only: true                   # drop extended-hours bars before session math
                                   # (opening range, VWAP, relative volume)

research:
  universe: ["COIN", "SMCI", "PLTR", "TSLA", "AMD", "MU", "NVDA", "AVGO", "MSTR", "META"]
  max_watchlist_size: 10
  filters:
    min_avg_daily_volume: 1000000  # liquidity floor (shares)
    min_price: 5.0
    max_price: 1000.0
    min_gap_percent: 2.0           # |gap| threshold to qualify
    min_relative_volume: 1.5       # RVOL threshold
  sentiment:
    enabled: true
    provider: "finnhub"            # finnhub | newsapi | none
    lookback_hours: 12
    min_articles: 3

indicators:
  ema_periods: [9, 21, 50, 200]
  rsi_period: 14
  atr_period: 14
  macd:
    fast: 12
    slow: 26
    signal: 9

# ── Strategies (Module 3) — toggle switches ──
strategies:
  vwap_pullback:
    enabled: false                   # PF 0.77-0.86 in every backtest config (2026-06 review);
                                     # back to research until it shows positive expectancy
    trend_ema: 21
    max_distance_from_vwap_atr: 0.5
  opening_range_breakout:
    enabled: true
    opening_range_minutes: 15
    volume_confirmation: true
    entry_mode: "breakout"           # breakout | retest (research mode: A/B 2026-06
                                     # showed no edge gain from retest entries)
    retest_max_bars: 12              # break goes stale after this many bars w/o retest
    touch_tolerance_atr: 0.25        # level "touch zone" width in ATR multiples
    require_gap_direction_match: true   # long only on gap-up, short only on gap-down
    max_gap_pct: 8.0                 # reject exhaustion gaps (gap-and-crap)
    max_gap_norm: 4.0                # reject gaps > 4x prior daily ATR
    max_entry_minutes_after_open: 90 # no new ORB entries after 11:00 ET (0 = off)
    min_breakout_rvol: 1.75           # SIP sweep 2025-01→2026-06: PF 1.16 clean, 1.00 stress
    min_or_width_pct: 0.0             # min OR width as % of open (0.3 tested — use CLI to A/B)
    max_or_width_atr: 0.0             # max OR width vs daily ATR (1.5 tested — use CLI to A/B)
  momentum_scalp:
    enabled: false
    fast_ema: 9
    slow_ema: 21
    min_relative_volume: 2.0
  regime_filter:                   # gate strategies by market regime
    mode: "enforce"                # off | shadow (log only) | enforce (block)
                                   # backtest 2026-06: gating ORB to trend days moved
                                   # its expectancy from -$10.61 to +$0.47/trade
    allowed:
      opening_range_breakout: ["trend"]
      momentum_scalp: ["trend"]
      vwap_pullback: ["balanced"]
  vol_gate:
    mode: "off"                      # off | shadow | enforce (prior-day VIX / SPY proxy)
    vix_symbol: "VIX"
    max_vix: 28.0
    max_vix_percentile: 0.85
    use_spy_proxy: true
    max_spy_atr_percentile: 0.80
  pf_gate:
    mode: "shadow"                   # off | shadow | enforce (rolling PF deployment gate)
    lookback_trades: 20
    min_trades: 10
    min_pf: 0.90

# ── Risk & Execution (Module 4) ──
risk:
  starting_equity: 100000.0        # virtual account seed (sim mode)
  max_risk_per_trade_pct: 1.0
  max_daily_drawdown_pct: 3.0      # KILL SWITCH threshold (from intraday peak)
  max_open_positions: 5
  max_position_size_pct: 20.0
  stop_loss:
    method: "atr"                  # atr | structural
    atr_multiplier: 2.0
  take_profit:
    method: "trailing"             # trailing (no fixed cap) | fixed (no trail)
    risk_reward_ratio: 2.0         # used only when method = fixed
    trailing_atr_multiplier: 1.5   # trail distance; activates after +1R
  slippage_pct: 0.05               # +0.05% applied to sim fills
  commission_per_trade: 0.0
  entry_collar_bps: 15.0           # marketable-limit collar past ref price (live)
  kelly:                           # fractional-Kelly sizing (capped at max_risk)
    enabled: false                 # enable only once per-strategy stats are stable
    fraction: 0.25                 # quarter-Kelly
    min_trades: 50                 # minimum closed trades before Kelly applies
    lookback_trades: 200

# ── ML signal filtering (meta-labeling) ──
ml:
  meta_filter:
    mode: "shadow"                 # off | shadow (score + log) | enforce (block)
    threshold: 0.55                # min P(win); tuned for core10 model (AUC ~0.57)
    model_path: "data/models/meta_label_core10.pkl"

# ── Schedule (orchestrator) — times in app.timezone ──
schedule:
  premarket_research: "07:00"
  market_open: "09:30"
  market_close: "16:00"
  flatten_time: "15:55"            # flatten BEFORE the close (live orders after
                                   # 16:00 are rejected -> overnight risk)
  report_time: "16:15"

# ── Reporting (Module 6) ──
reporting:
  output_dir: "data/reports"
  chart_timeframe: "5m"
  send_email: true
  attach_individual_charts: true
